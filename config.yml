    profileMode:
          enabled: true
          title: Yuxin Guo
          subtitle: "Hi! I am a PhD student in the [Neural Computation and Machine Learning Joint Program](https://www.ml.cmu.edu/academics/joint-phd-neural-computation.html) at Carnegie Mellon University, advised by [Prof. Pulkit Grover](https://users.ece.cmu.edu/~pgrover/) and [Prof. Robert Kass](https://www.stat.cmu.edu/~kass/). My research focuses on machine learning, deep learning, and optimization for neural signal processing. I develop end-to-end systems for neural sensing, source localization, and brain stimulation optimization under real-world hardware constraints. I have a strong background in generative models, time-series analysis, and convex optimization."
          imageUrl: "picture.jpeg"
          imageWidth: 160
          imageHeight: 160
